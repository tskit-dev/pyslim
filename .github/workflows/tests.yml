name: Tests

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v17

  test:
    name: Python
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python: ["3.11", "3.13"]
        os: [macos-latest, ubuntu-24.04, windows-latest]
        sys: [mingw64, ucrt64]
        env: [x86_64, ucrt-x86_64]
        exclude:
          - os: macos-latest
            sys: ucrt64
          - os: macos-latest
            sys: mingw64
            env: ucrt-x86_64
          - os: ubuntu-24.04
            sys: ucrt64
          - os: ubuntu-24.04
            sys: mingw64
            env: ucrt-x86_64
          - os: windows-latest
            sys: ucrt64
            env: x86_64
          - os: windows-latest
            sys: mingw64
            env: ucrt-x86_64
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66  # 0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Conda
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-name: anaconda-client-env
          cache-environment: true
          create-args: |
            python=${{ matrix.python }}

      - name: Setup MSYS2 ${{matrix.sys}}
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884  # v2.32.0
        if: matrix.os == 'windows-latest'
        with:
          msystem: ${{matrix.sys}}
          release: false
          install: >-
            git
            base-devel
            msys2-devel
            mingw-w64-${{matrix.env}}-zstd
            mingw-w64-${{matrix.env}}-zlib
            mingw-w64-${{matrix.env}}-toolchain
            mingw-w64-${{matrix.env}}-cmake
            mingw-w64-${{matrix.env}}-autotools

      - name: Cache SLiM build
        if: matrix.os == 'windows-latest'
        id: cache-slim
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: D:\a\pyslim\pyslim\SLiM
          key: ${{runner.os}}-${{matrix.sys}}-${{matrix.env}}-key

      - name: Build SLiM (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-slim.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          git clone https://github.com/messerlab/SLiM.git
          mkdir -p SLiM/Release
          cd SLiM/windows_compat/gnulib
          touch --date="`date`" aclocal.m4 Makefile.am configure configure.ac config.h.in Makefile.in
          cd ../..
          cd Release
          cmake -G"MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          make -j 2

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv sync --locked --group test --no-default-groups

      - name: Install SLiM (macOS / Linux)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-24.04'
        run: micromamba install slim -y

      - name: Run tests
        run: |
          export PATH=$PWD/SLiM/Release:$PATH
          uv run --no-default-groups --group test pytest \
            -n 0 -v \
            --cov=pyslim --cov-branch \
            --cov-report=xml \
            tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          flags: python-tests
          files: coverage.xml
          disable_search: true
          verbose: true
